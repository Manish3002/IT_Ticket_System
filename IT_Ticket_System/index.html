<!DOCTYPE html>
<html>
<head>
    <title>IT Support Ticket System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-4">
        <div class="text-center mb-4">
            <h1 class="text-primary">🎫 IT Support Ticket System</h1>
            <p class="lead">Report issues and track progress</p>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h5 class="card-title mb-3">📝 Report an Issue</h5>
                <form id="ticketForm">
                    <div class="mb-3">
                        <label class="form-label">Your Name</label>
                        <input type="text" id="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Issue Description</label>
                        <textarea id="issue" rows="3" class="form-control" required></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Issue Type</label>
                            <select id="issue_type" class="form-select">
                                <option>General / IT Support</option>
                                <option>Bug / Technical Error</option>
                                <option>Password Reset</option>
                                <option>Software Installation</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Priority</label>
                            <select id="priority" class="form-select">
                                <option>Low</option>
                                <option selected>Medium</option>
                                <option>High</option>
                                <option>Critical</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Submit Ticket</button>
                </form>
                <div id="result" class="mt-3"></div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <h5 class="card-title mb-3">📋 All Tickets</h5>
                <button onclick="loadTickets()" class="btn btn-secondary btn-sm mb-3">Refresh</button>
                <div id="ticketList">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        const API = "http://localhost:5000";

        document.getElementById("ticketForm").onsubmit = async (e) => {
            e.preventDefault();

            const res = await fetch(`${API}/submit`, {
                method: "POST",
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: document.getElementById("name").value,
                    issue: document.getElementById("issue").value,
                    issue_type: document.getElementById("issue_type").value,
                    priority: document.getElementById("priority").value
                })
            });
            const data = await res.json();

            document.getElementById("result").innerHTML = `<div class="alert alert-success">✅ Ticket #${data.id} created! ${data.jira_id ? 'Jira: ' + data.jira_id : ''}</div>`;
            document.getElementById("ticketForm").reset();
            loadTickets();
        };

        async function loadTickets() {
            const res = await fetch(`${API}/tickets`);
            const tickets = await res.json();
            if(tickets.length === 0) {
                document.getElementById("ticketList").innerHTML = "<p class='text-muted'>No tickets yet</p>";
                return;
            }
            let html = `<div class="table-responsive"><table class="table table-bordered">
                <thead class="table-light"><tr><th>ID</th><th>Name</th><th>Issue</th><th>Type</th><th>Priority</th><th>Status</th><th>Jira</th></tr></thead><tbody>`;
            for(let t of tickets) {
                html += `<tr>
                    <td>#${t.id}</td>
                    <td>${t.name}</td>
                    <td>${t.issue.substring(0,50)}</td>
                    <td>${t.issue_type} ${t.bug ? '🐛' : ''}</td>
                    <td><span class="badge ${t.priority=='High'?'bg-danger':t.priority=='Medium'?'bg-warning':'bg-success'}">${t.priority}</span></td>
                    <td><span class="badge ${t.status=='Open'?'bg-secondary':t.status=='Resolved'?'bg-success':'bg-info'}">${t.status}</span></td>
                    <td>${t.jira_id || '-'}</td>
                </tr>`;
            }
            html += "</tbody></table></div>";
            document.getElementById("ticketList").innerHTML = html;
        }

        loadTickets();
    </script>
</body>
</html>
